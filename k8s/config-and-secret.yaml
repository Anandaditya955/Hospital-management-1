apiVersion: v1
kind: ConfigMap
metadata:
  name: hospital-configmap
data:
  MONGO_URI: "mongodb://mongodb-service:27017/hospital_management"
  PORT: "5000"
  NODE_ENV: "production"
---
apiVersion: v1
kind: Secret
metadata:
  name: hospital-secret
type: Opaque
stringData:                       # stringData = plain text, k8s encodes it for you
  SESSION_SECRET: "hospital-session-2026@secure123"
  JWT_SECRET: "jwt-hospital-secret-key-98765"
  ADMIN_USERNAME: "admin"
  ADMIN_PASSWORD: "admin123"
